id: hyperliquid
label: Hyperliquid Docs
startUrls:
  - https://hyperliquid.gitbook.io/hyperliquid-docs
allowedHosts:
  - hyperliquid.gitbook.io
discovery:
  include:
    - https://hyperliquid.gitbook.io/hyperliquid-docs**
  exclude: []
  maxPages: 500
extract:
  strategy: selector
  selector: main
normalize:
  prependSourceComment: true
schedule:
  everyHours: 24
