id: synthetix
label: Synthetix Docs
startUrls:
  - https://developers.synthetix.io/
allowedHosts:
  - developers.synthetix.io
discovery:
  include:
    - https://developers.synthetix.io/**
  exclude: []
  maxPages: 500
extract:
  strategy: selector
  selector: .vocs_Content
normalize:
  prependSourceComment: true
schedule:
  everyHours: 24
