id: lighter
label: Lighter Docs
startUrls:
  - https://apidocs.lighter.xyz/docs/get-started
  - https://apidocs.lighter.xyz/reference/status
allowedHosts:
  - apidocs.lighter.xyz
discovery:
  include:
    - https://apidocs.lighter.xyz/docs/**
    - https://apidocs.lighter.xyz/reference/**
  exclude: []
  maxPages: 800
extract:
  strategy: readability
normalize:
  prependSourceComment: true
schedule:
  everyHours: 24
