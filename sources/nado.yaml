id: nado
label: Nado Docs
startUrls:
  - https://docs.nado.xyz/
allowedHosts:
  - docs.nado.xyz
discovery:
  include:
    - https://docs.nado.xyz/**
  exclude: []
  maxPages: 500
extract:
  strategy: clipboardButton
  interactions:
    - action: press
      key: Escape
    - action: click
      selector: button[aria-label="More"]
    - action: click
      selector: '[role="menuitem"]'
normalize:
  prependSourceComment: true
schedule:
  everyHours: 24
