id: ethereal
label: Ethereal Docs
startUrls:
  - https://docs.ethereal.trade/
allowedHosts:
  - docs.ethereal.trade
discovery:
  include:
    - https://docs.ethereal.trade/**
  exclude: []
  maxPages: 500
extract:
  strategy: clipboardButton
  interactions:
    - action: click
      selector: button[aria-label="Copy page"]
normalize:
  prependSourceComment: true
schedule:
  everyHours: 24
