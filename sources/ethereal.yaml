id: ethereal
label: Ethereal Docs
startUrls:
  - https://docs.ethereal.trade/
allowedHosts:
  - docs.ethereal.trade
discovery:
  include:
    - https://docs.ethereal.trade/**
  exclude: []
  maxPages: 500
extract:
  strategy: selector
  selector: main
normalize:
  prependSourceComment: true
schedule:
  everyHours: 24
