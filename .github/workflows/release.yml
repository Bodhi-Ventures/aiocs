name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.15.9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Validate release contract
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_NAME="@bodhi-ventures/aiocs"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          PACKAGE_MANIFEST_NAME="$(node -p "require('./package.json').name")"

          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> "${GITHUB_ENV}"
          echo "TAG_VERSION=${TAG_VERSION}" >> "${GITHUB_ENV}"

          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must match vX.Y.Z." >&2
            exit 1
          fi

          if [[ "${PACKAGE_MANIFEST_NAME}" != "${PACKAGE_NAME}" ]]; then
            echo "package.json name must be ${PACKAGE_NAME}, got ${PACKAGE_MANIFEST_NAME}." >&2
            exit 1
          fi

          if [[ "${PACKAGE_VERSION}" != "${TAG_VERSION}" ]]; then
            echo "package.json version ${PACKAGE_VERSION} does not match tag ${TAG_VERSION}." >&2
            exit 1
          fi

      - name: Validate release candidate
        run: |
          pnpm lint
          pnpm test
          pnpm build
          npm pack --dry-run
          node dist/cli.js --version

      - name: Check npm release status
        id: npm_release
        shell: bash
        run: |
          if npm view "${PACKAGE_NAME}@${TAG_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish to npm
        if: steps.npm_release.outputs.published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Check GitHub release status
        id: gh_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create GitHub release
        if: steps.gh_release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag
